name: Alertas Microsoft Teams

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  alerta:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar alerta para o Teams
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [
                {
                  "contentType": "application/vnd.microsoft.card.adaptive",
                  "content": {
                    "type": "AdaptiveCard",
                    "version": "1.4",
                    "body": [
                      {
                        "type": "TextBlock",
                        "size": "Medium",
                        "weight": "Bolder",
                        "text": "GitHub Actions - ${{ github.repository }}"
                      },
                      {
                        "type": "FactSet",
                        "facts": [
                          {"title": "Evento", "value": "${{ github.event_name }}"},
                          {"title": "Branch", "value": "${{ github.ref_name }}"},
                          {"title": "Autor", "value": "${{ github.actor }}"},
                          {"title": "Commit", "value": "${{ github.sha }}"}
                        ]
                      }
                    ],
                    "actions": [
                      {
                        "type": "Action.OpenUrl",
                        "title": "Ver no GitHub",
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                }
              ]
            }'
