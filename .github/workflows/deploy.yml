name: Deploy React to deploy branch

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v3

      - name: Setup Node.js (latest LTS)
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Deploy para branch deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Verifica se a branch deploy existe localmente
          if git show-ref --verify --quiet refs/heads/deploy; then
            git branch -D deploy
          fi

          # Cria branch deploy com apenas a pasta dist
          git checkout --orphan deploy
          
          # Remove todos os arquivos atuais do índice
          git rm -rf --cached . 2>/dev/null || true
          
          # Adiciona apenas o conteúdo da pasta dist
          git --work-tree=dist add --all
          
          # Cria commit se houver alterações
          git --work-tree=dist commit -m "Deploy automático - $(date '+%Y-%m-%d %H:%M:%S')" || echo "Nenhuma alteração para commit"

          # Força push para branch deploy
          git push origin HEAD:deploy --force
